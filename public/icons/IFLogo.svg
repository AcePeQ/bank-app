<svg
  xmlns="http://www.w3.org/2000/svg"
  width="180"
  height="100"
  viewBox="0 0 180 100"
  fill="none"
  role="img"
  aria-labelledby="logo-title logo-description"
>
  <title id="logo-title">Infinity Finance</title>
  <desc id="logo-description">
    Wycentrowane pionowe logo Infinity Finance z symbolem nieskończoności
    i subtelną strzałką wzrostu.
  </desc>

  <defs>
    <linearGradient
      id="infinity-finance-gradient"
      x1="58"
      y1="18"
      x2="122"
      y2="52"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#005CAD" />
      <stop offset="1" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <g
    stroke="url(#infinity-finance-gradient)"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path
      d="M59 37
         C59 24 72 19 81 28
         L99 46
         C108 55 121 50 121 37
         C121 24 108 19 99 28
         L81 46
         C72 55 59 50 59 37"
      stroke-width="5"
    />

    <path
      d="M102 35L116 21"
      stroke-width="4"
    />

    <path
      d="M108 21H116V29"
      stroke-width="4"
    />
  </g>

  <text
    x="90"
    y="84"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
  >
    <tspan fill="#005CAD">Infinity</tspan>
    <tspan fill="#181C23"> Finance</tspan>
  </text>
</svg>
