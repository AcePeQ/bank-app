<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icons/IFLogo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="/src/styles/reset.css" rel="stylesheet" />
  <link href="/src/styles/main.css" rel="stylesheet" />
  <link href="/src/styles/base.css" rel="stylesheet" />
  <link href="/src/styles/layout.css" rel="stylesheet" />
  <link href="/src/styles/components/buttons.css" rel="stylesheet" />
  <link href="/src/styles/components/loader.css" rel="stylesheet" />
  <link href="/src/styles/pages/login.css" rel="stylesheet" />

  <script src="/src/pages/login.ts" type="module" defer></script>

  <title>Infinity Finance - Login Page</title>
</head>

<body>
  <main>
    <div class="layout-wrapper grid-12 section-login">
      <div class="login-box">
        <section class="banner">
          <img class="img-logo img-logo--banner" src="/icons/IFLogo.svg" alt="" />

          <hgroup>
            <h2 class="banner__title">
              <span class="banner__title-part-one">Master your</span>
              <span class="banner__title-part-two">financial flow.</span>
            </h2>
            <p class="banner__subtitle">Experience the next generation of wealth
              management with real-time analytics and
              institutional-grade security.</p>
          </hgroup>
        </section>

        <section class="form-section form-container">
          <div class="header">
            <hgroup>
              <h1>Welcome Back</h1>
              <p>Enter your credentials to access your account</p>
            </hgroup>
          </div>

          <form id="form" class="form" method="post" novalidate aria-describedby="formError">
            <div class="form__row">
              <label for="email" class="form__label">Email Address</label>
              <input autocomplete="email" aria-describedby="emailError" id="email" name="email" class="form__input"
                type="email" placeholder="name@example.com" aria-invalid="false" required maxlength="254"
                pattern="[^\s@]+@[^\s@]+\.[^\s@]{2,}" />
              <p id="emailError" aria-live="polite" class="form__error"></p>
            </div>

            <div class="form__row">
              <label for="password" class="form__label">Password</label>
              <div class="input-box">
                <input autocomplete="current-password" data-type="password" aria-describedby="passwordError"
                  id="password" name="password" class="form__input" type="password" aria-invalid="false"
                  placeholder="********" required />
                <button id="buttonShowPassword" class="button-show-password" type="button" aria-label="Show password"
                  aria-controls="password">
                  <i id="showPasswordIcon" data-lucide="eye"></i>
                  <i id="hidePasswordIcon" data-lucide="eye-off" class="hidden"></i>
                </button>
              </div>
              <p id="passwordError" aria-live="polite" class="form__error"></p>
            </div>

            <div class="form__row margin-b-0">
              <label for="rememberSession" class="form__label--session">
                <input id="rememberSession" name="rememberSession" type="checkbox" class="form__input--checkbox" />
                <span>Remember me for 30 days</span>
              </label>
            </div>

            <p id="formError" aria-live="polite" class="form__error hidden"></p>

            <button id="loginBtn" type="submit" class="btn btn--primary btn--big btn--form">
              <span role="status" id="loader" class="dots dots--normal hidden">
                <span class="sr-only">Logging in...</span>
              </span>
              <span id="loginBtnText">
                Login to Dashboard
              </span>
            </button>

            <p class="account-information">Don't have an account? <a href="/register/">Sign Up</a></p>
          </form>
        </section>
      </div>
    </div>
  </main>
</body>

</html>
