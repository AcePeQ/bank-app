<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icons/IFLogo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="/src/styles/reset.css" rel="stylesheet" />
  <link href="/src/styles/main.css" rel="stylesheet" />
  <link href="/src/styles/base.css" rel="stylesheet" />
  <link href="/src/styles/layout.css" rel="stylesheet" />
  <link href="/src/styles/components/buttons.css" rel="stylesheet" />
  <link href="/src/styles/components/loader.css" rel="stylesheet" />
  <link href="/src/styles/pages/login.css" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="/src/pages/login.ts" defer></script>

  <title>Infinity Finance - Login Page</title>
</head>

<body>
  <main>
    <div class="layout-wrapper grid-12 section-login">
      <div class="login-box">
        <section class="banner">
          <img class="img-logo img-logo--banner" src="/icons/IFLogo.svg" alt="Infinity Finance - Logo" />

          <hgroup>
            <h1 class="banner__title">
              <span class="banner__title-part-one">Master your</span>
              <span class="banner__title-part-two">financial flow.</span>
            </h1>
            <p class="banner__subtitle">Experience the next generation of wealth
              management with real-time analytics and
              institutional-grade security.</p>
          </hgroup>
        </section>

        <section class="form-section form-container">
          <div class="header">
            <hgroup>
              <h1>Welcome Back</h1>
              <p>Enter your credentials to access your account</p>
            </hgroup>
          </div>

          <form class="form" method="get">
            <div class="form__row">
              <label for="email" class="form__label">Email Address</label>
              <input id="email" name="email" class="form__input" type="email" placeholder="name@exmaple.com" />
              <p class="form__error"></p>
            </div>

            <div class="form__row">
              <label for="password" class="form__label">Password</label>
              <div class="form__row__input-box">
                <input id="password" name="password" class="form__input" type="password" placeholder="********" />
                <button class="form__row_button_show-password" type="button" aria-label="Show password">
                  <i data-lucide="menu"></i>
                </button>
              </div>
            </div>

            <div class="form__row">
              <label for="rememberSession" class="form__label--session">
                <input id="rememberSession" type="checkbox" class="form__input--checkbox" />
                <p>Remember me for 30 days</p>
              </label>
            </div>

            <button class="btn btn--primary btn--big btn--form">
              Login to Dashboard
            </button>

            <p class="account-information">Don't have an account? <a href="#">Sign Up</a></p>
          </form>
        </section>
      </div>
    </div>
  </main>
</body>

</html>
